services:
  payload:
    image: node:22.17.0-alpine
    ports:
      - '3000:3000'
    volumes:
      - .:/home/node/app
      - node_modules:/home/node/app/node_modules
    working_dir: /home/node/app/
    command: sh -c "npm install && npm run dev"
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      # Points to the postgres service below.
      # Remove this override to use the DATABASE_URI from .env (e.g. a hosted database).
      DATABASE_URI: postgresql://postgres:postgres@postgres:5432/koren-web

  postgres:
    image: postgres:17-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: koren-web
    volumes:
      # Keeps the database files alongside the media uploads in the gitignored
      # `editeur-livres` data folder, so backing up / migrating = copying one folder.
      - ./editeur-livres/postgres:/var/lib/postgresql/data

volumes:
  node_modules:
