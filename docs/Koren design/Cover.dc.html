<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;0,600;1,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
</helmet>

<div style="container-type:inline-size; position:relative; width:100%; aspect-ratio:1/1.5; background:{{ bg }}; color:{{ fg }}; border-radius:2px; overflow:hidden; box-shadow:0 10px 26px -12px rgba(30,20,10,.45); border:1px solid rgba(0,0,0,.18); font-family:'Source Serif 4',Georgia,serif;">

  <!-- spine sheen -->
  <div style="position:absolute; left:0; top:0; bottom:0; width:7cqw; background:linear-gradient(90deg, rgba(255,255,255,.16), rgba(255,255,255,.04) 40%, rgba(0,0,0,.12)); pointer-events:none;"></div>
  <!-- subtle inner frame -->
  <div style="position:absolute; inset:5cqw 5cqw; border:1px solid rgba(255,255,255,.14); border-radius:1px; pointer-events:none;"></div>

  <!-- badge -->
  <sc-if value="{{ badge }}" hint-placeholder-val="">
    <div style="position:absolute; top:0; right:0; font-family:'IBM Plex Mono',monospace; font-size:3.1cqw; letter-spacing:0.4cqw; text-transform:uppercase; background:{{ accent }}; color:{{ bg }}; padding:1.6cqw 3cqw; border-bottom-left-radius:2px;">{{ badge }}</div>
  </sc-if>

  <div style="position:absolute; inset:0; display:flex; flex-direction:column; justify-content:space-between; padding:9cqw 8cqw;">
    <div style="font-family:'IBM Plex Mono',monospace; font-size:3.1cqw; letter-spacing:0.55cqw; text-transform:uppercase; color:{{ accent }};">{{ publisher }}</div>

    <div style="display:flex; flex-direction:column;">
      <div style="width:11cqw; height:1px; background:{{ accent }}; margin-bottom:5cqw; opacity:.8;"></div>
      <div style="font-family:'Cormorant',serif; font-weight:500; font-size:13.5cqw; line-height:1.0; letter-spacing:-0.1cqw; min-height:2em;">{{ title }}</div>
      <div style="font-family:'Source Serif 4',serif; font-style:italic; font-size:5cqw; line-height:1.2; margin-top:4cqw; opacity:.86;">{{ author }}</div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 240, &quot;height&quot;: 360 },
  &quot;title&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Les Voix de l'Alliance&quot; },
  &quot;author&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Jonathan Sacks&quot; },
  &quot;publisher&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Koren · Maggid&quot; },
  &quot;bg&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#6E1726&quot; },
  &quot;fg&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#F3E8D2&quot; },
  &quot;accent&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#C9A24A&quot; },
  &quot;badge&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;&quot; }
}"></script>
</body>
</html>
